<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Manager - WeSpeak</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        /* Animations */
        .message-enter {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transform-origin: bottom left;
        }
        
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .typing-dot {
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .shadow-glow-purple {
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.5);
        }
    </style>
</head>
<body class="bg-[#050505] min-h-screen flex items-center justify-center p-4 font-sans relative overflow-hidden">
    
    <!-- Background Blur Effects -->
    <div class="absolute inset-0 bg-gradient-to-br from-purple-900/20 to-black z-0"></div>
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-[100px] z-0"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-pink-600/10 rounded-full blur-[100px] z-0"></div>

    <!-- Phone Mockup -->
    <div class="w-full max-w-[400px] h-[800px] max-h-[90vh] bg-black border-[8px] border-gray-900 rounded-[3rem] overflow-hidden flex flex-col relative shadow-[0_0_50px_rgba(168,85,247,0.15)] z-10">
        
        <!-- Top Notch -->
        <div class="absolute top-0 inset-x-0 h-6 flex justify-center z-50">
            <div class="w-32 h-6 bg-gray-900 rounded-b-3xl"></div>
        </div>

        <!-- Header -->
        <div class="pt-10 pb-3 px-4 bg-gray-900/90 backdrop-blur-md border-b border-gray-800 flex items-center justify-between z-40">
            <div class="flex items-center gap-3">
                <button class="text-white hover:text-gray-300 transition-colors">
                    <i data-lucide="chevron-left" class="w-7 h-7"></i>
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 via-pink-500 to-orange-500 p-[2px]">
                        <div class="w-full h-full bg-black rounded-full flex items-center justify-center overflow-hidden">
                            <img src="https://picsum.photos/seed/wespeak/100/100" alt="WeSpeak" class="w-full h-full object-cover">
                        </div>
                    </div>
                    <div>
                        <div class="flex items-center gap-1">
                            <span class="font-bold text-white text-sm">WeSpeak</span>
                            <i data-lucide="badge-check" class="w-3.5 h-3.5 text-blue-500 fill-current"></i>
                        </div>
                        <span id="status-text" class="text-xs text-gray-400">Escribiendo...</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4 text-white">
                <i data-lucide="phone" class="w-5 h-5 hover:text-purple-400 cursor-pointer transition-colors"></i>
                <i data-lucide="video" class="w-5 h-5 hover:text-purple-400 cursor-pointer transition-colors"></i>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 custom-scrollbar bg-[#000000] pb-6">
            <div class="text-center text-xs text-gray-500 my-4 uppercase tracking-widest">Hoy 10:41 a.m.</div>
            
            <!-- Messages will be injected here -->
            <div id="messages-area" class="space-y-6"></div>

            <!-- Typing Indicator -->
            <div id="typing-indicator" class="flex gap-3 max-w-[85%] message-enter">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-pink-500 p-[1px] shrink-0 mt-auto">
                    <div class="w-full h-full bg-black rounded-full flex items-center justify-center overflow-hidden">
                        <img src="https://picsum.photos/seed/wespeak/100/100" alt="WeSpeak" class="w-full h-full object-cover">
                    </div>
                </div>
                <div class="bg-gray-800 text-white text-sm p-3 rounded-2xl rounded-bl-sm flex items-center gap-1 h-[44px]">
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></span>
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></span>
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></span>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-black border-t border-gray-900 z-40">
            <div class="flex items-center gap-3 bg-gray-900 rounded-full px-4 py-2 border border-gray-800 focus-within:border-purple-500 transition-colors">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-600 to-pink-600 flex items-center justify-center shrink-0 cursor-pointer hover:scale-105 transition-transform">
                    <i data-lucide="camera" class="w-4 h-4 text-white"></i>
                </div>
                <input type="text" placeholder="Escribe un mensaje..." class="flex-1 bg-transparent text-white text-sm focus:outline-none placeholder-gray-500" readonly>
                
                <button id="apply-btn" class="hidden text-white bg-purple-600 hover:bg-purple-500 px-4 py-1.5 rounded-full font-bold text-sm transition-colors whitespace-nowrap shadow-glow-purple message-enter" onclick="alert('¡Redirigiendo al formulario de aplicación!')">
                    ¡Aplicar!
                </button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Data for the chat
        const messages = [
            { type: 'text', content: '¡Hola! 👋 Revisamos tu perfil y nos encanta tu vibra.' },
            { type: 'text', content: 'Estamos buscando a nuestro próximo <strong>Community Manager</strong>. Alguien que no solo publique, sino que construya una comunidad real y sea la voz de la marca.' },
            { type: 'card', title: 'Tus misiones diarias 🎯', items: [
                'Crear, programar y gestionar contenido en redes sociales.', 
                'Interactuar con la comunidad: responder comentarios y DMs.', 
                'Monitorear tendencias y memes para sumarnos a la conversación.', 
                'Analizar métricas y proponer estrategias.', 
                'Colaborar con el equipo de diseño y creadores.'
            ]},
            { type: 'card', title: 'Lo que necesitas traer a la mesa 🧠', items: [
                'Experiencia previa gestionando redes sociales.', 
                'Excelente ortografía y creatividad para copywriting.', 
                'Conocimiento de algoritmos de Instagram y TikTok.', 
                'Habilidad para usar herramientas de gestión y diseño básico.', 
                'Empatía y paciencia para atención al cliente.'
            ]},
            { type: 'text', content: 'Ofrecemos <strong>$6,000 - $8,000 MXN / Mes</strong>, trabajo 100% remoto, flexibilidad de horario y la libertad de proponer ideas locas. 🚀' },
            { type: 'text', content: '¿Te animas a tomar el control de nuestras redes?' }
        ];

        const messagesArea = document.getElementById('messages-area');
        const typingIndicator = document.getElementById('typing-indicator');
        const chatContainer = document.getElementById('chat-container');
        const applyBtn = document.getElementById('apply-btn');
        const statusText = document.getElementById('status-text');

        let currentIndex = 0;

        function createMessageHTML(msg) {
            if (msg.type === 'text') {
                return `
                    <div class="flex gap-3 max-w-[85%] message-enter">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-pink-500 p-[1px] shrink-0 mt-auto">
                            <div class="w-full h-full bg-black rounded-full flex items-center justify-center overflow-hidden">
                                <img src="https://picsum.photos/seed/wespeak/100/100" alt="WeSpeak" class="w-full h-full object-cover">
                            </div>
                        </div>
                        <div class="bg-gray-800 text-white text-sm p-3.5 rounded-2xl rounded-bl-sm leading-relaxed shadow-sm">
                            ${msg.content}
                        </div>
                    </div>
                `;
            } else if (msg.type === 'card') {
                const itemsHTML = msg.items.map(item => `
                    <li class="flex items-start gap-2.5">
                        <i data-lucide="check-circle-2" class="w-4 h-4 text-purple-500 shrink-0 mt-0.5"></i>
                        <span class="text-gray-200 text-sm leading-relaxed">${item}</span>
                    </li>
                `).join('');

                return `
                    <div class="flex gap-3 max-w-[90%] message-enter">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-pink-500 p-[1px] shrink-0 mt-auto">
                            <div class="w-full h-full bg-black rounded-full flex items-center justify-center overflow-hidden">
                                <img src="https://picsum.photos/seed/wespeak/100/100" alt="WeSpeak" class="w-full h-full object-cover">
                            </div>
                        </div>
                        <div class="bg-gray-800 text-white text-sm p-4 rounded-2xl rounded-bl-sm shadow-sm border border-gray-700/50">
                            <h4 class="font-bold text-purple-400 mb-3 text-base">${msg.title}</h4>
                            <ul class="space-y-2.5">
                                ${itemsHTML}
                            </ul>
                        </div>
                    </div>
                `;
            }
        }

        function showNextMessage() {
            if (currentIndex < messages.length) {
                const msgHTML = createMessageHTML(messages[currentIndex]);
                messagesArea.insertAdjacentHTML('beforeend', msgHTML);
                
                // Re-initialize icons for the newly added HTML
                lucide.createIcons();
                
                // Scroll to bottom
                chatContainer.scrollTo({
                    top: chatContainer.scrollHeight,
                    behavior: 'smooth'
                });

                currentIndex++;

                if (currentIndex === messages.length) {
                    // All messages shown
                    typingIndicator.style.display = 'none';
                    statusText.textContent = 'En línea ahora';
                    applyBtn.classList.remove('hidden');
                    applyBtn.classList.add('block');
                } else {
                    // Schedule next message
                    setTimeout(showNextMessage, 1800);
                }
            }
        }

        // Start the chat sequence after a short delay
        setTimeout(showNextMessage, 1800);
    </script>
</body>
</html>
